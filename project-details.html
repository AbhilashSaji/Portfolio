<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Showcase | Abhilash Saji</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #02080c;
            --bg-card: rgba(4, 18, 25, 0.8);
            --primary-green: #00ff66; 
            --text-main: #ffffff;
            --text-muted: #8da4ae;
            --border-color: rgba(0, 255, 102, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            padding-top: 80px;
            position: relative;
            min-height: 100vh;
        }
        
        a { text-decoration: none; color: inherit; transition: all 0.3s ease; }

        /* Background & Particles */
        #dynamic-bg-blur { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: blur(15px) brightness(0.25); transform: scale(1.05); z-index: -2; transition: background-image 0.5s ease; }
        #particles-js { position: fixed; width: 100%; height: 100vh; top: 0; left: 0; z-index: -1; pointer-events: none; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 14px 6%; background: rgba(2, 8, 12, 0.85); backdrop-filter: blur(16px); position: fixed; width: 100%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255, 255, 255, 0.03); }
        .logo { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.1rem; letter-spacing: 1.5px; }
        .logo i { color: var(--primary-green); }
        .btn-go-back-nav { border: 1px solid var(--primary-green); background: rgba(0, 255, 102, 0.05); color: var(--primary-green); padding: 8px 18px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .btn-go-back-nav:hover { background: var(--primary-green); color: var(--bg-dark); }

        .details-container { max-width: 1400px; margin: 0 auto; padding: 20px 6%; position: relative; z-index: 5; }
        
        /* Hero Grid */
        .hero-grid { display: grid; grid-template-columns: 1.2fr 1.8fr; gap: 30px; margin-bottom: 35px; align-items: start; }
        .brief-info-box { background: var(--bg-card); padding: 25px; border-radius: 8px; border: 1px solid var(--border-color); backdrop-filter: blur(8px); }
        .proj-tag-badge { border-radius: 4px; font-size: 0.65rem; padding: 4px 10px; font-weight: 700; text-transform: uppercase; width: fit-content; margin-bottom: 15px; display: block; border: 1px solid var(--primary-green); color: var(--primary-green); }
        .proj-title { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; font-weight: 900; text-transform: uppercase; color: #ffffff; margin-bottom: 15px; }
        
        .game-brief-section { display: flex; gap: 15px; align-items: start; margin-bottom: 20px; }
        .brief-thumb-wrapper { width: 140px; height: 90px; border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }
        .brief-thumb-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .brief-text-desc { color: var(--text-muted); font-size: 0.85rem; line-height: 1.5; }

        .meta-dashboard-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .meta-box { border: 1px solid rgba(255, 255, 255, 0.03); background: rgba(2, 8, 12, 0.6); padding: 10px; border-radius: 4px; }
        .meta-box span { font-size: 0.58rem; color: var(--text-muted); text-transform: uppercase; display: block; margin-bottom: 2px; }
        .meta-box p { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; font-weight: 700; color: #ffffff; }
        
        .btn-live { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; font-weight: 700; padding: 14px 24px; border-radius: 4px; text-transform: uppercase; display: inline-flex; align-items: center; gap: 8px; width: 100%; justify-content: center; background: var(--primary-green); color: var(--bg-dark); }
        .btn-live:hover { box-shadow: 0 0 20px var(--primary-green); transform: translateY(-1px); }

        /* Media Tray */
        .steam-media-wrapper { display: flex; flex-direction: column; gap: 12px; background: var(--bg-card); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); backdrop-filter: blur(8px); }
        .video-player-frame { width: 100%; height: 360px; border-radius: 6px; background: #000; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .video-player-frame iframe, .video-player-frame img { width: 100%; height: 100%; border: none; object-fit: cover; }
        .slider-relative-tray { position: relative; display: flex; align-items: center; width: 100%; padding: 0 35px; }
        .steam-thumbnail-slider { display: flex; gap: 10px; overflow-x: hidden; scroll-behavior: smooth; width: 100%; }
        .steam-thumb { flex: 0 0 calc(20% - 8px); height: 65px; border: 2px solid rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; cursor: pointer; position: relative; background: #000; opacity: 0.6; }
        .steam-thumb:hover, .steam-thumb.active { opacity: 1; border-color: var(--primary-green); }
        .steam-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .slider-arrow { background: rgba(2, 8, 12, 0.9); border: 1px solid rgba(255,255,255,0.1); color: #ffffff; position: absolute; top: 0; bottom: 0; width: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 20; font-size: 0.8rem; height: 65px; border-radius: 4px; }

        /* Content Rows */
        .overview-row { display: grid; grid-template-columns: 1.2fr 1.8fr; gap: 30px; margin-bottom: 35px; margin-top: 15px; align-items: stretch; }
        .section-headline { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; text-transform: uppercase; color: #ffffff; margin-bottom: 18px; letter-spacing: 0.5px; display: flex; align-items: center; gap: 10px; }
        .section-headline::after { content: ''; height: 2px; background: linear-gradient(90deg, var(--primary-green), transparent); flex-grow: 1; margin-left: 10px; }
        .overview-box { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; padding: 25px; height: calc(100% - 36px); }
        .overview-box p { color: var(--text-muted); font-size: 0.88rem; line-height: 1.6; }
        
        /* Features */
        .features-sub-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .feature-card-item { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; padding: 14px 18px; display: flex; align-items: center; gap: 18px; height: 84px; }
        
        /* Hypercasual Icons */
        .coin-icon-shell { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; background: linear-gradient(135deg, var(--c-top), var(--c-bottom)); box-shadow: 0 4px 8px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); }
        .coin-icon-shell i { font-size: 1.2rem; color: #fff; }
        .c1 { --c-top: #ffd700; --c-bottom: #ff8c00; }
        .c2 { --c-top: #00ffbc; --c-bottom: #00b395; }
        .c3 { --c-top: #ff4d79; --c-bottom: #cc0033; }
        .c4 { --c-top: #33ccff; --c-bottom: #0088cc; }
        .c5 { --c-top: #bb55ff; --c-bottom: #8800cc; }
        .c6 { --c-top: #a6ff00; --c-bottom: #73cc00; }
        
        .feature-card-item h4 { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: #fff; }
        .feature-card-item p { color: var(--text-muted); font-size: 0.7rem; }
    </style>
</head>
<body>
    <div id="dynamic-bg-blur"></div>
    <div id="particles-js"></div>
    <header>
        <div class="logo"><i class="fa-solid fa-gamepad"></i> ABHILASH SAJI</div>
        <a href="projects.html" class="btn-go-back-nav">Back to Projects</a>
    </header>
    <main class="details-container" id="details-root"></main>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": { "number": { "value": 50 }, "color": { "value": "#00ff66" }, "shape": { "type": "circle" }, "opacity": { "value": 0.5 }, "size": { "value": 3 }, "move": { "enable": true, "speed": 2 } },
            "interactivity": { "detect_on": "canvas" }, "retina_detect": true
        });

        const urlParams = new URLSearchParams(window.location.search);
        const projectId = parseInt(urlParams.get('id'));

        fetch('projects.json')
            .then(res => res.json())
            .then(data => {
                const proj = data.find(p => p.id === projectId);
                document.getElementById('dynamic-bg-blur').style.backgroundImage = `url('${proj.image}')`;

                const featuresMarkup = proj.features.map((f, i) => `
                    <div class="feature-card-item c${(i % 6) + 1}">
                        <div class="coin-icon-shell"><i class="${f.icon}"></i></div>
                        <div><h4>${f.title}</h4><p>${f.desc}</p></div>
                    </div>
                `).join('');

                let sliderMarkup = '';
                if (proj.videos) proj.videos.forEach((v, i) => sliderMarkup += `<div class="steam-thumb ${i===0?'active':''}" data-index="${i}" onclick="switchSteamMedia('video', '${v.url}', this)"><div class="steam-thumb-overlay-icon"><i class="fa-solid fa-play"></i></div><img src="${proj.image}"></div>`);
                if (proj.gallery) proj.gallery.forEach((img, i) => sliderMarkup += `<div class="steam-thumb" data-index="${proj.videos.length + i}" onclick="switchSteamMedia('image', '${img}', this)"><img src="${img}"></div>`);

                document.getElementById('details-root').innerHTML = `
                    <div class="hero-grid">
                        <div class="brief-info-box">
                            <span class="proj-tag-badge tag-${proj.tagColor || 'green'}">${proj.tag}</span>
                            <h1 class="proj-title">${proj.name}</h1>
                            <div class="game-brief-section">
                                <div class="brief-thumb-wrapper"><img src="${proj.image}"></div>
                                <p class="brief-text-desc">${proj.desc}</p>
                            </div>
                            <div class="meta-dashboard-grid">
                                <div class="meta-box"><span>Year</span><p>${proj.year}</p></div>
                                <div class="meta-box"><span>Platform</span><p>${proj.platform}</p></div>
                                <div class="meta-box"><span>Engine</span><p>${proj.engine}</p></div>
                                <div class="meta-box"><span>Role</span><p>${proj.role}</p></div>
                            </div>
                            <a href="${proj.liveDemo}" target="_blank" class="btn-live"><i class="fa-solid fa-circle-play"></i> Play Build</a>
                        </div>
                        <div class="steam-media-wrapper">
                            <div class="video-player-frame" id="steam-main-viewport"><iframe id="steam-iframe-target" src="${proj.videoUrl}" allowfullscreen></iframe></div>
                            <div class="slider-relative-tray">
                                <button class="slider-arrow arrow-left" onclick="slideSteamTray('left')"><i class="fa-solid fa-chevron-left"></i></button>
                                <div class="steam-thumbnail-slider" id="steam-slider-track">${sliderMarkup}</div>
                                <button class="slider-arrow arrow-right" onclick="slideSteamTray('right')"><i class="fa-solid fa-chevron-right"></i></button>
                            </div>
                        </div>
                    </div>
                    <div class="overview-row">
                        <div><h3 class="section-headline">Project Overview</h3><div class="overview-box"><p>${proj.overview}</p></div></div>
                        <div><h3 class="section-headline">Key Features</h3><div class="features-sub-grid">${featuresMarkup}</div></div>
                    </div>
                `;
            });

        function switchSteamMedia(type, path, el) {
            document.querySelectorAll('.steam-thumb').forEach(e => e.classList.remove('active'));
            el.classList.add('active');
            const viewport = document.getElementById('steam-main-viewport');
            viewport.innerHTML = type === 'video' ? `<iframe src="${path}" allowfullscreen></iframe>` : `<img src="${path}">`;
        }

        function slideSteamTray(dir) {
            const track = document.getElementById('steam-slider-track');
            track.scrollLeft += (dir === 'right' ? 300 : -300);
        }
    </script>
</body>
</html>
