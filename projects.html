<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Projects | Abhilash Saji</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #02080c;
            --bg-card: #041219;
            --primary-green: #00ff66; 
            --text-main: #ffffff;
            --text-muted: #7d9096;
            --border-color: rgba(255, 255, 255, 0.05);
            --glow-color: rgba(0, 255, 102, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }

        a { text-decoration: none; color: inherit; transition: all 0.3s ease; }

        /* --- BASIC HEADER --- */
        header {
            padding: 22px 8%;
            background: rgba(2, 8, 12, 0.75);
            backdrop-filter: blur(12px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            text-align: center;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.15rem;
            letter-spacing: 1.5px;
        }
        .logo i { color: var(--primary-green); }

        /* --- ARCHIVE CONTENT --- */
        .archive-section {
            padding: 140px 8% 80px 8%;
        }

        .archive-title-wrapper { margin-bottom: 40px; }
        .archive-subtitle {
            color: var(--primary-green);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .archive-main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        .archive-desc { color: var(--text-muted); font-size: 1rem; max-width: 650px; }

        /* --- FILTER BUTTONS ROW --- */
        .filter-buttons-row {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 35px;
        }
        .btn-filter {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-filter:hover, .btn-filter.active {
            border-color: var(--primary-green);
            color: var(--primary-green);
            background-color: rgba(0, 255, 102, 0.02);
        }

        /* --- GRID ARCHITECTURE --- */
        .archive-projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .archive-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .img-wrapper { position: relative; width: 100%; height: 230px; background-color: #061822; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; opacity: 0.85; }
        .tag-badge {
            position: absolute; top: 15px; left: 15px; background: rgba(2, 8, 12, 0.9);
            border: 1px solid var(--primary-green); color: var(--primary-green);
            font-size: 0.65rem; padding: 4px 10px; border-radius: 4px; font-weight: 700; text-transform: uppercase;
        }

        .info-panel { padding: 25px; display: flex; flex-direction: column; flex-grow: 1; }
        .title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .proj-name { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 700; text-transform: uppercase; }
        .proj-desc { color: var(--text-muted); font-size: 0.85rem; line-height: 1.6; margin-bottom: 25px; flex-grow: 1; }

        /* Technology Pills Row */
        .tech-badges-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 15px;
        }
        .badge-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            font-size: 0.65rem;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .proj-link {
            font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
            color: var(--primary-green); display: flex; align-items: center; gap: 8px;
        }

        /* --- CONTACT SECTION AT BOTTOM --- */
        .contact-section-lower {
            padding: 60px 8%;
            background: rgba(4, 18, 25, 0.5);
            text-align: center;
        }
        .contact-cta-bar { display: flex; justify-content: center; align-items: center; gap: 20px; font-size: 0.95rem; color: var(--text-muted); }
        .btn-cta-contact {
            border: 1px solid var(--primary-green);
            background: transparent;
            color: var(--primary-green);
            padding: 10px 22px;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
        }
        .btn-cta-contact:hover { background: var(--primary-green); color: var(--bg-dark); }

        /* --- FOOTER REGION --- */
        footer {
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding: 35px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-gamepad"></i> ABHILASH SAJI</div>
    </header>

    <main class="archive-section">
        <div class="archive-title-wrapper">
            <div class="archive-subtitle">My Work</div>
            <h1 class="archive-main-title">All Projects</h1>
            <p class="archive-desc">A collection of games designed and developed using Unity and C#.</p>
        </div>

        <div class="filter-buttons-row">
            <button class="btn-filter active" onclick="filterCategory('all', this)"><i class="fa-solid fa-table-cells"></i> All</button>
            <button class="btn-filter" onclick="filterCategory('2d', this)"><i class="fa-solid fa-gamepad"></i> 2D Games</button>
            <button class="btn-filter" onclick="filterCategory('3d', this)"><i class="fa-solid fa-cube"></i> 3D Games</button>
            <button class="btn-filter" onclick="filterCategory('other', this)"><i class="fa-solid fa-ellipsis-vertical"></i> Other</button>
        </div>

        <div class="archive-projects-grid" id="archive-grid-root">
            </div>
    </main>

    <section class="contact-section-lower">
        <div class="contact-cta-bar">
            <span>Interested in working together?</span>
            <a href="index.html#contact" class="btn-cta-contact">Contact Me</a>
        </div>
    </section>

    <footer>
        <div>&copy; 2026 Abhilash Saji. All rights reserved.</div>
        <div>Let's Build Something Amazing Together! 🚀</div>
    </footer>

    <script>
        let projectsData = [];

        // Fetch master local list of values
        fetch('projects.json')
            .then(response => response.json())
            .then(data => {
                projectsData = data;
                renderCards(projectsData);
            });

        function renderCards(list) {
            const gridRoot = document.getElementById('archive-grid-root');
            
            gridRoot.innerHTML = list.map(proj => {
                // Dynamically build tech stack pill badges loops
                const badgesMarkup = proj.tech.map(t => `<span class="badge-item">${t}</span>`).join('');

                return `
                    <div class="archive-card">
                        <div class="img-wrapper">
                            <span class="tag-badge">${proj.tag}</span>
                            <img src="${proj.image}" alt="${proj.name}" onerror="this.src='https://via.placeholder.com/350x230/061822/ffffff?text=Game+Asset'">
                        </div>
                        <div class="info-panel">
                            <h3 class="proj-name" style="margin-bottom:15px;">${proj.name}</h3>
                            <p class="proj-desc">${proj.desc}</p>
                            
                            <div class="tech-badges-row">
                                ${badgesMarkup}
                            </div>
                            
                            <a href="#" class="proj-link">View Project <i class="fa-solid fa-arrow-right"></i></a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Filtering engine architecture
        function filterCategory(cat, buttonElement) {
            document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');

            if(cat === 'all') {
                renderCards(projectsData);
            } else {
                const filtered = projectsData.filter(p => p.category === cat);
                renderCards(filtered);
            }
        }
    </script>
</body>
</html>
